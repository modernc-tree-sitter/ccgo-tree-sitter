name: Restore source workspace
description: >
  Download the source-workspace artifact and extract it into GITHUB_WORKSPACE
  (or a given path). Matrix jobs use this instead of actions/checkout.
inputs:
  path:
    description: Directory to extract into
    required: false
    default: ${{ github.workspace }}
  artifact-name:
    description: Artifact name uploaded by prepare
    required: false
    default: source-workspace
runs:
  using: composite
  steps:
    - name: Download source artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ runner.temp }}/source-artifact

    - name: Extract into workspace
      shell: bash
      env:
        DEST: ${{ inputs.path }}
        ART: ${{ runner.temp }}/source-artifact
      run: |
        set -euo pipefail
        mkdir -p "$DEST"
        shopt -s nullglob
        archive=""
        for f in "$ART"/*.tar.gz "$ART"/*.tgz "$ART"/*; do
          [ -f "$f" ] || continue
          case "$f" in
            *.tar.gz|*.tgz) archive="$f"; break ;;
          esac
        done
        if [ -z "$archive" ] && [ -f "$ART/source-workspace.tar.gz" ]; then
          archive="$ART/source-workspace.tar.gz"
        fi
        if [ -z "${archive:-}" ] || [ ! -f "$archive" ]; then
          echo "error: no source tarball in $ART" >&2
          find "$ART" -type f | head -50 >&2 || true
          exit 1
        fi

        # Windows Git Bash: GNU tar treats "D:\path" as remote host "D".
        # Prefer MSYS paths; only GNU tar supports --force-local (not BSD tar on macOS).
        tar_path() {
          if command -v cygpath >/dev/null 2>&1; then
            cygpath -u "$1"
          else
            case "$1" in
              [A-Za-z]:*)
                local drive
                drive="$(printf '%s' "${1:0:1}" | tr '[:upper:]' '[:lower:]')"
                printf '/%s%s\n' "$drive" "$(printf '%s' "${1:2}" | sed 's|\\|/|g')"
                ;;
              *)
                printf '%s\n' "$1" | sed 's|\\|/|g'
                ;;
            esac
          fi
        }

        dest_u="$(tar_path "$DEST")"
        arch_u="$(tar_path "$archive")"
        echo "extracting $arch_u -> $dest_u"

        tar_args=(-C "$dest_u" -xzf "$arch_u")
        # GNU tar only (Linux/Windows Git Bash). BSD tar on macOS rejects this.
        if tar --help 2>&1 | grep -q -- '--force-local'; then
          tar_args=(--force-local "${tar_args[@]}")
        fi

        tar "${tar_args[@]}"

        if [ ! -f "$DEST/go.mod" ]; then
          echo "error: go.mod missing after extract in $DEST" >&2
          ls -la "$DEST" >&2 || true
          exit 1
        fi
        echo "restored source at $DEST ($(du -sh "$DEST" | cut -f1))"
