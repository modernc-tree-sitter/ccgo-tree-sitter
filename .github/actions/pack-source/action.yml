name: Pack source workspace
description: >
  Tar the repository worktree without .git (or nested submodule .git)
  for upload as a shared CI artifact. Uses gzip for runner portability.
inputs:
  path:
    description: Directory to pack (default GITHUB_WORKSPACE)
    required: false
    default: ${{ github.workspace }}
  output:
    description: Output tarball path
    required: false
    default: ${{ runner.temp }}/source-workspace.tar.gz
runs:
  using: composite
  steps:
    - name: Pack worktree (no .git)
      shell: bash
      env:
        SRC: ${{ inputs.path }}
        OUT: ${{ inputs.output }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "$OUT")"
        # Exclude every path component named .git (root + submodule metadata).
        # --force-local: on Windows, paths with drive letters must not be remote hosts.
        tar_path() {
          if command -v cygpath >/dev/null 2>&1; then
            cygpath -u "$1"
          else
            echo "$1"
          fi
        }
        src_u="$(tar_path "$SRC")"
        out_u="$(tar_path "$OUT")"
        tar --force-local -C "$src_u" \
          --exclude='.git' \
          -czf "$out_u" .
        ls -lh "$OUT"
        echo "Packed $(du -h "$OUT" | cut -f1) from $SRC"
