name: Pack source workspace
description: >
  Tar the repository worktree without .git for a shared CI artifact.
  Symlinks are dereferenced so Windows can extract the archive.
inputs:
  path:
    description: Directory to pack (default GITHUB_WORKSPACE)
    required: false
    default: ${{ github.workspace }}
  output:
    description: Output tarball path
    required: false
    default: ${{ runner.temp }}/source-workspace.tar.gz
runs:
  using: composite
  steps:
    - name: Pack worktree (no .git, no symlinks)
      shell: bash
      env:
        SRC: ${{ inputs.path }}
        OUT: ${{ inputs.output }}
      run: |
        set -euo pipefail
        mkdir -p "$(dirname "$OUT")"
        # -h/--dereference: store file contents instead of symlinks (Windows extract
        # cannot create many repo symlinks under third-party/*).
        # --exclude=.git: drop root and nested submodule git metadata.
        tar -C "$SRC" \
          --exclude='.git' \
          -h \
          -czf "$OUT" .
        ls -lh "$OUT"
        echo "Packed $(du -h "$OUT" | cut -f1) from $SRC"
