name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * 6" # Weekly Saturday UTC — drives codegen on main
  workflow_dispatch:

# One group per branch/PR; newer runs cancel in-flight matrix work.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  prepare:
    name: prepare source
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Pack source (no .git)
        uses: ./.github/actions/pack-source
        with:
          path: ${{ github.workspace }}
          output: ${{ runner.temp }}/source-workspace.tar.gz

      - name: Upload source artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: source-workspace
          path: ${{ runner.temp }}/source-workspace.tar.gz
          if-no-files-found: error
          retention-days: 2
          compression-level: 0 # already gzipped

  test:
    name: test (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [prepare]
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            task: codegen:linux-amd64
            experimental: false
            checked_in: true
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            task: codegen:linux-arm64
            experimental: false
            checked_in: true
          - runner: ubuntu-latest
            goos: linux
            goarch: 386
            task: codegen:linux-386
            experimental: true
            checked_in: false
            host_goarch: amd64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            task: codegen:darwin-amd64
            experimental: true
            checked_in: false
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            task: codegen:darwin-arm64
            experimental: false
            checked_in: false
          - runner: windows-latest
            goos: windows
            goarch: amd64
            task: codegen:windows-amd64
            experimental: false
            checked_in: false
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
            task: codegen:windows-arm64
            experimental: true
            checked_in: false

    steps:
      # Local composite actions need a tiny checkout of .github only (no submodules).
      - name: Checkout actions only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true

      - name: Restore source
        uses: ./.github/actions/restore-source

      - name: Set up tools (mise)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Setup preprocessor
        uses: ./.github/actions/setup-preprocessor
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}

      - name: Verify runner can build target
        shell: bash
        run: |
          set -euo pipefail
          host_goos="$(go env GOOS)"
          host_goarch="$(go env GOARCH)"
          want_goos="${{ matrix.goos }}"
          want_goarch="${{ matrix.goarch }}"
          expect_host_goarch="${{ matrix.host_goarch }}"
          if [ -z "$expect_host_goarch" ] || [ "$expect_host_goarch" = "null" ]; then
            expect_host_goarch="${{ matrix.goarch }}"
          fi
          echo "host=${host_goos}/${host_goarch} target=${want_goos}/${want_goarch} expect_host_goarch=${expect_host_goarch}"
          test "$host_goos" = "$want_goos"
          test "$host_goarch" = "$expect_host_goarch"

      - name: Test codegen tool
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: go test ./cmd/codegen/

      - name: Codegen target bindings
        if: ${{ !matrix.checked_in }}
        shell: bash
        run: mise run "${{ matrix.task }}"

      - name: Run tests
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...

  codegen:
    name: codegen (${{ matrix.goos }}/${{ matrix.goarch }})
    needs: [prepare]
    # Multi-platform grammar regen only on main (push, schedule, manual).
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' ||
       github.event_name == 'schedule' ||
       github.event_name == 'workflow_dispatch')
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            task: codegen:linux-amd64
            experimental: false
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            task: codegen:linux-arm64
            experimental: false
          - runner: ubuntu-latest
            goos: linux
            goarch: 386
            task: codegen:linux-386
            experimental: true
            host_goarch: amd64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            task: codegen:darwin-amd64
            experimental: true
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            task: codegen:darwin-arm64
            experimental: false
          - runner: windows-latest
            goos: windows
            goarch: amd64
            task: codegen:windows-amd64
            experimental: false
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
            task: codegen:windows-arm64
            experimental: true

    steps:
      - name: Checkout actions only
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          sparse-checkout: |
            .github
          sparse-checkout-cone-mode: true

      - name: Restore source
        uses: ./.github/actions/restore-source

      - name: Set up tools (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Setup preprocessor
        uses: ./.github/actions/setup-preprocessor
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}

      - name: Verify runner can build target
        shell: bash
        run: |
          set -euo pipefail
          host_goos="$(go env GOOS)"
          host_goarch="$(go env GOARCH)"
          want_goos="${{ matrix.goos }}"
          want_goarch="${{ matrix.goarch }}"
          expect_host_goarch="${{ matrix.host_goarch }}"
          if [ -z "$expect_host_goarch" ] || [ "$expect_host_goarch" = "null" ]; then
            expect_host_goarch="${{ matrix.goarch }}"
          fi
          echo "host=${host_goos}/${host_goarch} target=${want_goos}/${want_goarch} expect_host_goarch=${expect_host_goarch}"
          test "$host_goos" = "$want_goos"
          test "$host_goarch" = "$expect_host_goarch"

      - name: Codegen ${{ matrix.goos }}/${{ matrix.goarch }}
        shell: bash
        run: mise run "${{ matrix.task }}"

      - name: Collect artifact
        shell: bash
        run: |
          ./scripts/collect-codegen-artifact.sh \
            "${{ runner.temp }}/codegen-out" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}"

      - name: Upload codegen artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codegen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/codegen-out/
          if-no-files-found: error
          retention-days: 7

      - name: Test generated grammar on target
        continue-on-error: ${{ matrix.experimental }}
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...

  merge:
    name: merge artifacts and open PR
    needs: [codegen]
    if: ${{ always() && !cancelled() && needs.codegen.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Writable git tree for create-pull-request (not the packed artifact).
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up tools (mise)
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Download codegen artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: codegen-*
          path: ${{ runner.temp }}/codegen-artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: find "${{ runner.temp }}/codegen-artifacts" -type f | LC_ALL=C sort

      - name: Merge into working tree
        run: |
          set -euo pipefail
          arts="${{ runner.temp }}/codegen-artifacts"
          if ! compgen -G "${arts}/*/" > /dev/null; then
            echo "error: no codegen artifacts downloaded" >&2
            exit 1
          fi
          ./scripts/merge-codegen-artifacts.sh "$arts"
          {
            echo "## Codegen matrix"
            echo
            for d in "$arts"/*/; do
              name="$(basename "${d%/}")"
              # artifact dir is codegen-linux-amd64 → core key linux-amd64
              core_key="${name#codegen-}"
              core="grammar/core-${core_key}.go"
              if [[ -f "$core" ]]; then
                count="$(find grammar -type f -name "grammar-${core_key}.go" | wc -l | tr -d ' ')"
                echo "- \`${core_key//-/\/}\`: ✅ core + ${count} grammars"
              else
                echo "- \`${core_key//-/\/}\`: ❌ missing after merge"
              fi
            done
            echo
            echo "Experimental legs (\`linux/386\`, \`darwin/amd64\`, \`windows/arm64\`) may be absent when they fail."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test merged linux/amd64 tree
        run: mise run test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated grammars"
          title: "Update generated grammars"
          body: |
            Automated multi-platform update of tree-sitter grammar bindings.

            Each CI runner transpiled its **native** `GOOS`/`GOARCH`, uploaded those
            sources, and this job merged them into `grammar/`.

            Source tree was prepared once (shared artifact) for the matrix.

            See the workflow job summary for per-target status.
          branch: codegen-update
          delete-branch: true
          add-paths: |
            grammar/**
            cmd/parse/languages.go
