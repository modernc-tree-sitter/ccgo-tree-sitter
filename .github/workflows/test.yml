name: Test

on:
  push:
  pull_request:
  workflow_dispatch:

# A newer push to the same branch (or PR head) cancels in-flight matrix jobs
# from the previous run, including overlapping push + pull_request triggers.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native runners only. Bindings are GOOS/GOARCH-tagged; missing
          # checked-in cores are generated on the runner before tests.
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            task: codegen:linux-amd64
            experimental: false
            checked_in: true
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            task: codegen:linux-arm64
            experimental: false
            checked_in: true
          - runner: ubuntu-latest
            goos: linux
            goarch: 386
            task: codegen:linux-386
            experimental: true
            checked_in: false
            # Built/run as 386 on an amd64 Linux host.
            host_goarch: amd64
          - runner: macos-15-intel
            goos: darwin
            goarch: amd64
            task: codegen:darwin-amd64
            experimental: true
            checked_in: false
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            task: codegen:darwin-arm64
            experimental: false
            checked_in: false
          - runner: windows-latest
            goos: windows
            goarch: amd64
            task: codegen:windows-amd64
            experimental: false
            checked_in: false
          - runner: windows-11-arm
            goos: windows
            goarch: arm64
            task: codegen:windows-arm64
            experimental: true
            checked_in: false

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up tools (mise)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Setup preprocessor
        uses: ./.github/actions/setup-preprocessor
        with:
          goos: ${{ matrix.goos }}
          goarch: ${{ matrix.goarch }}

      - name: Verify runner can build target
        shell: bash
        run: |
          set -euo pipefail
          host_goos="$(go env GOOS)"
          host_goarch="$(go env GOARCH)"
          want_goos="${{ matrix.goos }}"
          want_goarch="${{ matrix.goarch }}"
          expect_host_goarch="${{ matrix.host_goarch }}"
          if [ -z "$expect_host_goarch" ] || [ "$expect_host_goarch" = "null" ]; then
            expect_host_goarch="${{ matrix.goarch }}"
          fi
          echo "host=${host_goos}/${host_goarch} target=${want_goos}/${want_goarch} expect_host_goarch=${expect_host_goarch}"
          test "$host_goos" = "$want_goos"
          test "$host_goarch" = "$expect_host_goarch"

      - name: Test codegen tool
        shell: bash
        env:
          CGO_ENABLED: "0"
        run: go test ./cmd/codegen/

      - name: Codegen target bindings
        if: ${{ !matrix.checked_in }}
        shell: bash
        run: mise run "${{ matrix.task }}"

      - name: Run tests
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./...
