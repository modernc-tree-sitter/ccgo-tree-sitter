name: CI

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 6' # Weekly on Saturday at midnight
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  autorelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Set up tools (mise)
        uses: jdx/mise-action@v3

      - name: Install dependencies
        run: mise run install

      - name: Codegen
        run: mise run codegen

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated grammars"
          title: "Update generated grammars"
          body: "Automated update of tree-sitter grammars generated code."
          branch: "codegen-update"
          delete-branch: true

      - name: Run CI
        run: mise run ci

      - name: Build Artifacts
        run: mise run build

      - name: Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ccgo-tree-sitter-codegen
            ccgo-tree-sitter-parse
