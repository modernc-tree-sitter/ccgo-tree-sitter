name: Auto Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
  release:
    types: [created]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Install mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4

      - name: Install dependencies
        run: mise run install

      - name: Run Codegen
        run: mise run codegen

      - name: Create Pull Request if Codegen modified files
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          commit-message: "chore: update generated code"
          title: "chore: update generated code"
          body: "Autogenerated changes from `mise run codegen`"
          branch: "codegen-update"
          base: main
          labels: "automated pr"

      - name: Run CI (Lint & Test)
        run: mise run ci

      - name: Create Release
        if: github.event_name == 'workflow_dispatch' || github.ref_type == 'tag' || github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TAG="v$(date +'%Y.%m.%d-%H%M%S')"
            gh release create "$TAG" --title "Release $TAG" --generate-notes
          else
            gh release create "${{ github.ref_name }}" --title "Release ${{ github.ref_name }}" --generate-notes || true
          fi

      - name: Upload Grammar Artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: grammar
          path: grammar/
