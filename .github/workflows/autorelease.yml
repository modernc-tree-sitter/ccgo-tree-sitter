name: Auto Release

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 6' # Weekly on Saturday at midnight
  workflow_dispatch:

jobs:
  autorelease:
    concurrency:
      group: autorelease-${{ github.workflow }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up tools (mise)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Install
        run: mise run install

      - name: Codegen
        run: mise run codegen

      - name: PR if Difference
        uses: peter-evans/create-pull-request@aa523f9db61947bd5e06efd77870ef065eae32cc # v8
        with:
          base: main
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated grammars"
          title: "Update generated grammars"
          body: "Automated update of tree-sitter grammars generated code."
          branch: "codegen-update"
          delete-branch: true

      - name: CI
        run: mise run ci

      - name: Release
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ github.ref_name }} --generate-notes

      - name: Artifacts
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: artifacts
          path: ./
