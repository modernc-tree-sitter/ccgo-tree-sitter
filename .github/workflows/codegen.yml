name: Codegen and Test

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 6" # Weekly on Saturday at midnight UTC
  workflow_dispatch:

# A new push to main (or a newer run on the same ref) cancels in-flight
# matrix + merge jobs from the previous run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codegen:
    name: codegen (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Each runner transpiles only its native GOOS/GOARCH with host clang.
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            task: codegen:linux-amd64
            experimental: false
          - runner: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            task: codegen:linux-arm64
            experimental: false
          - runner: ubuntu-latest
            goos: linux
            goarch: 386
            task: codegen:linux-386
            experimental: true
          - runner: macos-latest
            goos: darwin
            goarch: arm64
            task: codegen:darwin-arm64
            experimental: false
          - runner: windows-latest
            goos: windows
            goarch: amd64
            task: codegen:windows-amd64
            experimental: false

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive

      - name: Set up tools (mise)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Install clang (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
          if [ "${{ matrix.goarch }}" = "386" ]; then
            sudo apt-get install -y gcc-multilib g++-multilib libc6-dev-i386
          fi

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install mingw -y --no-progress
          $mingwCandidates = @(
            "C:\ProgramData\mingw64\mingw64",
            "C:\mingw64",
            "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64",
            "C:\msys64\mingw64"
          )
          $found = $false
          foreach ($root in $mingwCandidates) {
            $bin = Join-Path $root "bin"
            $gcc = Join-Path $bin "gcc.exe"
            if (Test-Path $gcc) {
              $bin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
              "MINGW_SYSROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              "CC=$gcc" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "Using MinGW gcc=$gcc sysroot=$root"
              $found = $true
              break
            }
          }
          if (-not $found) { throw "MinGW gcc.exe not found" }
          & (Join-Path $bin "gcc.exe") --version

      - name: Verify preprocessor
        shell: bash
        run: |
          echo "host=$(go env GOOS)/$(go env GOARCH) target=${{ matrix.goos }}/${{ matrix.goarch }}"
          echo "CC=${CC:-}"
          echo "MINGW_SYSROOT=${MINGW_SYSROOT:-}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            command -v gcc
            gcc --version
            gcc -dM -E -x c /dev/null | head -20
          else
            command -v clang
            clang --version
          fi

      # cmd/parse blank-imports every grammar package, which only compile when
      # core-{GOOS}-{GOARCH}.go exists for the host. Run those tests after codegen.
      - name: Test codegen tool
        shell: bash
        run: go test ./cmd/codegen/

      - name: Codegen ${{ matrix.goos }}/${{ matrix.goarch }}
        shell: bash
        run: mise run "${{ matrix.task }}"

      - name: Collect artifact
        shell: bash
        run: |
          ./scripts/collect-codegen-artifact.sh \
            "${{ runner.temp }}/codegen-out" \
            "${{ matrix.goos }}" \
            "${{ matrix.goarch }}"

      - name: Upload codegen artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: codegen-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ runner.temp }}/codegen-out/
          if-no-files-found: error
          retention-days: 7

      - name: Test generated grammar on host
        continue-on-error: ${{ matrix.experimental }}
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./grammar/ ./cmd/parse/

  merge:
    name: merge artifacts and open PR
    needs: codegen
    if: ${{ always() && !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up tools (mise)
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8 # v3

      - name: Download codegen artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: codegen-*
          path: ${{ runner.temp }}/codegen-artifacts
          merge-multiple: false

      - name: List downloaded artifacts
        run: find "${{ runner.temp }}/codegen-artifacts" -type f | LC_ALL=C sort

      - name: Merge into working tree
        run: |
          set -euo pipefail
          arts="${{ runner.temp }}/codegen-artifacts"
          if ! compgen -G "${arts}/*/" > /dev/null; then
            echo "error: no codegen artifacts downloaded" >&2
            exit 1
          fi
          ./scripts/merge-codegen-artifacts.sh "$arts"
          {
            echo "## Codegen matrix"
            echo
            for d in "$arts"/*/; do
              name="$(basename "${d%/}")"
              core="grammar/core-${name}.go"
              if [[ -f "$core" ]]; then
                count="$(find grammar -type f -name "grammar-${name}.go" | wc -l | tr -d ' ')"
                echo "- \`${name//-/\/}\`: ✅ core + ${count} grammars"
              else
                echo "- \`${name//-/\/}\`: ❌ missing after merge"
              fi
            done
            echo
            echo "Experimental legs (\`linux/386\`, \`windows/arm64\`) may be absent when they fail."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Test merged linux/amd64 tree
        run: go test ./...

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update generated grammars"
          title: "Update generated grammars"
          body: |
            Automated multi-platform update of tree-sitter grammar bindings.

            Each CI runner transpiled its **native** `GOOS`/`GOARCH` with host `clang`
            (MinGW gcc -E on Windows), uploaded those sources, and this job merged
            them into `grammar/`.

            See the workflow job summary for per-target status.
          branch: codegen-update
          delete-branch: true
          add-paths: |
            grammar/**
            cmd/parse/languages.go
