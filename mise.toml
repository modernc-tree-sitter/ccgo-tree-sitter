[tools]
go = "1.26.0"
uv = "0.9.28"
"go:golang.org/x/tools/gopls" = "0.21.0"


[tasks."codegen:linux-amd64"]
env = { TARGET_GOOS = "linux", TARGET_GOARCH = "amd64" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:linux-arm64"]
env = { TARGET_GOOS = "linux", TARGET_GOARCH = "arm64" }
run = "go run -v ./cmd/codegen"

[tasks.codegen]
depends = ["codegen:*"]

[tasks.install]
depends = ["install:*"]

[tasks."install:deps"]
run = "go mod download"

[tasks."install:workspaced"]
run = "go install -v github.com/lucasew/workspaced/cmd/workspaced@v0.5.3 || { dir=$(mktemp -d); git clone https://github.com/lucasew/workspaced.git \"$dir\"; cd \"$dir\"; git checkout v0.5.3 || true; go install -v ./cmd/workspaced; }"

[tasks.test]
depends = ["test:*"]

[tasks."test:python"]
run = "uv run test.py"

[tasks.lint]
run = "PATH=\"$HOME/go/bin:$PATH\" workspaced codebase lint"

[tasks.fmt]
run = "PATH=\"$HOME/go/bin:$PATH\" workspaced codebase format"

[tasks.ci]
depends = ["lint", "test"]

[tasks."test:go"]
run = "go test ./..."
