[tools]
go = "1.26.0"
uv = "0.9.28"
"go:golang.org/x/tools/gopls" = "0.21.0"

[env]
CC = "clang"

# Per-target tasks. CI runs exactly one task per runner (native OS/arch).
# Locally, `mise run codegen` runs only the host triple via scripts/codegen-host.sh.
# GOARCH for 32-bit x86 is `386` (i386).

[tasks."codegen:linux-amd64"]
env = { TARGET_GOOS = "linux", TARGET_GOARCH = "amd64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:linux-arm64"]
env = { TARGET_GOOS = "linux", TARGET_GOARCH = "arm64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:linux-386"]
env = { TARGET_GOOS = "linux", TARGET_GOARCH = "386", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:darwin-amd64"]
env = { TARGET_GOOS = "darwin", TARGET_GOARCH = "amd64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:darwin-arm64"]
env = { TARGET_GOOS = "darwin", TARGET_GOARCH = "arm64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:windows-amd64"]
env = { TARGET_GOOS = "windows", TARGET_GOARCH = "amd64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks."codegen:windows-arm64"]
env = { TARGET_GOOS = "windows", TARGET_GOARCH = "arm64", CC = "clang" }
run = "go run -v ./cmd/codegen"

[tasks.codegen]
description = "Codegen for the host GOOS/GOARCH only"
run = "bash ./scripts/codegen-host.sh"

[tasks."codegen:all"]
description = "Codegen every configured target (needs native headers per triple; prefer CI matrix)"
depends = [
  "codegen:linux-amd64",
  "codegen:linux-arm64",
  "codegen:linux-386",
  "codegen:darwin-amd64",
  "codegen:darwin-arm64",
  "codegen:windows-amd64",
  "codegen:windows-arm64",
]

[tasks.install]
run = "go get -v ./..."
